<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bias-Aware Credit Risk Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .result {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        
        .result h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .result-item {
            padding: 10px;
            margin: 10px 0;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .approved {
            color: #28a745;
            font-weight: bold;
        }
        
        .rejected {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Credit Risk Predictor</h1>
        <p class="subtitle">Bias-Aware AI System for Fair Credit Decisions</p>
        
        <form id="predictionForm">
            <div class="form-group">
                <label>Credit Limit (Amount)</label>
                <input type="number" name="LIMIT_BAL" required placeholder="e.g., 50000">
            </div>
            
            <div class="form-group">
                <label>Gender</label>
                <select name="SEX" required>
                    <option value="1">Male</option>
                    <option value="2">Female</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Education</label>
                <select name="EDUCATION" required>
                    <option value="1">Graduate School</option>
                    <option value="2">University</option>
                    <option value="3">High School</option>
                    <option value="4">Others</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Marital Status</label>
                <select name="MARRIAGE" required>
                    <option value="1">Married</option>
                    <option value="2">Single</option>
                    <option value="3">Others</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="AGE" required placeholder="e.g., 35">
            </div>
            
            <!-- Simplified: Other fields default to 0 -->
            <input type="hidden" name="PAY_0" value="0">
            <input type="hidden" name="PAY_2" value="0">
            <input type="hidden" name="PAY_3" value="0">
            <input type="hidden" name="PAY_4" value="0">
            <input type="hidden" name="PAY_5" value="0">
            <input type="hidden" name="PAY_6" value="0">
            <input type="hidden" name="BILL_AMT1" value="0">
            <input type="hidden" name="BILL_AMT2" value="0">
            <input type="hidden" name="BILL_AMT3" value="0">
            <input type="hidden" name="BILL_AMT4" value="0">
            <input type="hidden" name="BILL_AMT5" value="0">
            <input type="hidden" name="BILL_AMT6" value="0">
            <input type="hidden" name="PAY_AMT1" value="0">
            <input type="hidden" name="PAY_AMT2" value="0">
            <input type="hidden" name="PAY_AMT3" value="0">
            <input type="hidden" name="PAY_AMT4" value="0">
            <input type="hidden" name="PAY_AMT5" value="0">
            <input type="hidden" name="PAY_AMT6" value="0">
            
            <button type="submit" class="btn">Predict Credit Risk</button>
        </form>
        
        <div id="result" class="result">
            <h2>Prediction Results</h2>
            <div class="result-item">
                <strong>Baseline Model:</strong> <span id="baselinePred"></span>
            </div>
            <div class="result-item">
                <strong>Fair Model Decision:</strong> <span id="fairPred"></span>
            </div>
            <div class="result-item">
                <strong>Final Decision:</strong> <span id="decision"></span>
            </div>
            <div class="result-item">
                <small id="fairnessNote" style="color: #666;"></small>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            document.getElementById('baselinePred').textContent = result.baseline_prediction;
            document.getElementById('fairPred').textContent = result.fair_prediction;
            
            const decisionSpan = document.getElementById('decision');
            decisionSpan.textContent = result.decision;
            decisionSpan.className = result.decision === 'APPROVED' ? 'approved' : 'rejected';
            
            document.getElementById('fairnessNote').textContent = result.fairness_note;
            
            document.getElementById('result').style.display = 'block';
        });
    </script>
</body>
</html>
