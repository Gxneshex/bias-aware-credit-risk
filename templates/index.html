<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bias-Aware Credit Risk Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .demo-badge {
            text-align: center;
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        
        .result h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .result-item {
            padding: 10px;
            margin: 10px 0;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .approved {
            color: #28a745;
            font-weight: bold;
        }
        
        .rejected {
            color: #dc3545;
            font-weight: bold;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #dc3545;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Credit Risk Predictor</h1>
        <p class="subtitle">Bias-Aware AI System for Fair Credit Decisions</p>
        
        <div class="demo-badge">
            ⚠️ <strong>Demo Mode:</strong> Using sample predictions. Full model requires larger instance.
        </div>
        
        <form id="predictionForm">
            <div class="form-group">
                <label>Credit Limit (Amount in $)</label>
                <input type="number" name="LIMIT_BAL" required placeholder="e.g., 50000" min="10000" max="1000000">
            </div>
            
            <div class="form-group">
                <label>Gender</label>
                <select name="SEX" required>
                    <option value="1">Male</option>
                    <option value="2">Female</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Education Level</label>
                <select name="EDUCATION" required>
                    <option value="1">Graduate School</option>
                    <option value="2">University</option>
                    <option value="3">High School</option>
                    <option value="4">Others</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Marital Status</label>
                <select name="MARRIAGE" required>
                    <option value="1">Married</option>
                    <option value="2">Single</option>
                    <option value="3">Others</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="AGE" required placeholder="e.g., 35" min="21" max="100">
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Predict Credit Risk</button>
        </form>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div id="result" class="result">
            <h2>📊 Prediction Results</h2>
            <div class="result-item">
                <strong>Baseline Model:</strong> <span id="baselinePred"></span>
            </div>
            <div class="result-item">
                <strong>Fair Model Decision:</strong> <span id="fairPred"></span>
            </div>
            <div class="result-item">
                <strong>Final Decision:</strong> <span id="decision"></span>
            </div>
            <div class="result-item">
                <small id="fairnessNote" style="color: #666;"></small>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Disable button and show loading state
            const button = document.getElementById('submitBtn');
            const originalText = button.textContent;
            button.textContent = 'Predicting...';
            button.disabled = true;
            
            // Hide previous results and errors
            document.getElementById('result').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            
            try {
                const formData = new FormData(this);
                
                console.log('Sending request to /predict...');
                
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Server error:', errorText);
                    throw new Error(`Server returned ${response.status}: ${errorText}`);
                }
                
                const result = await response.json();
                console.log('Result:', result);
                
                if (result.error) {
                    throw new Error(result.error);
                }
                
                // Display results
                document.getElementById('baselinePred').innerHTML = 
                    result.baseline_prediction + 
                    (result.baseline_probability ? ` <span style="font-size: 12px; color: #666;">(${result.baseline_probability} probability)</span>` : '');
                
                document.getElementById('fairPred').textContent = result.fair_prediction;
                
                const decisionSpan = document.getElementById('decision');
                decisionSpan.textContent = result.decision;
                decisionSpan.className = result.decision === 'APPROVED' ? 'approved' : 'rejected';
                
                let fairnessText = result.fairness_note;
                if (result.bias_reduction) {
                    fairnessText += '<br><strong>Impact:</strong> ' + result.bias_reduction;
                }
                document.getElementById('fairnessNote').innerHTML = fairnessText;
                
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                
            } catch (error) {
                console.error('Error:', error);
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = '❌ Error: ' + error.message + '. Please try again or check the console for details.';
                errorDiv.style.display = 'block';
            } finally {
                // Re-enable button
                button.textContent = originalText;
                button.disabled = false;
            }
        });
        
        // Log when page loads
        console.log('Bias-Aware Credit Risk Predictor loaded');
        console.log('Ready to make predictions');
    </script>
</body>
</html>
